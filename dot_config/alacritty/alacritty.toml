[cursor]
vi_mode_style = "Block"

[cursor.style]
shape = "Beam"

[font]
size = 11.0

[font.bold]
family = "JetBrainsMono NF, Consolas, monospace"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMono NF, Consolas, monospace"
style = "Bold Italic"

[font.italic]
family = "JetBrainsMono NF, Consolas, monospace"
style = "Italic"

[font.normal]
family = "JetBrainsMono NF, Consolas, monospace"
style = "Regular"

[font.offset]
x = 0
y = 0

[terminal.shell]
program = "/usr/bin/zsh"

[window.padding]
x = 15
y = 10

[terminal]
